gateways:
  local:
    connection:
      type: duckdb
      database: ../data/fpl.duckdb

default_gateway: local

model_defaults:
  dialect: duckdb
  start: 2024-08-01
  cron: '@weekly'

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections